name: Bug report
description: Report a site bug, broken link, rendering issue, or incorrect behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A concise description of the problem.
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Affected page or URL
      placeholder: https://newlocalmedia.github.io/...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Notice ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or context
      description: Add screenshots, console output, or other details if helpful.
