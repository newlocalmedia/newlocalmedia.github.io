name: Site Quality

on:
  workflow_dispatch:
  push:
    paths:
      - 'index.html'
      - 'assets/**'
      - 'projects/**'
      - 'data/repos.json'
      - 'site.webmanifest'
      - 'robots.txt'
      - 'sitemap.xml'
      - 'scripts/check-site.mjs'
      - 'scripts/build-project-pages.mjs'
      - 'scripts/site-config.mjs'
      - 'scripts/update-repo-data.mjs'
      - '.htmlvalidate.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/site-quality.yml'
  pull_request:
    paths:
      - 'index.html'
      - 'assets/**'
      - 'projects/**'
      - 'data/repos.json'
      - 'site.webmanifest'
      - 'robots.txt'
      - 'sitemap.xml'
      - 'scripts/check-site.mjs'
      - 'scripts/build-project-pages.mjs'
      - 'scripts/site-config.mjs'
      - 'scripts/update-repo-data.mjs'
      - '.htmlvalidate.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/site-quality.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run site quality checks
        run: npm run check

      - name: Verify generated files are up to date
        run: git diff --exit-code
