name: Update repo data snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-repo-data.yml'
      - 'scripts/update-repo-data.mjs'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate repo snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-repo-data.mjs

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- data/repos.json; then
            echo "No snapshot changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/repos.json
          git commit -m "chore: update repo data snapshot"
          git push
