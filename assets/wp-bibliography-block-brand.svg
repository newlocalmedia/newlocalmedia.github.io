<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">Bibliography brand graphic</title>
  <desc id="desc">Bibliography wordmark and subtitle beside a three-book shelf mark, based on the latest plugin banner artwork.</desc>

  <rect width="1200" height="630" fill="#F5F3EF"/>

  <g transform="translate(118, 162) scale(1.45)">
    <rect x="0" y="168" width="360" height="7" rx="1.5" fill="#C4973E"/>

    <g transform="rotate(-4, 42, 148)">
      <rect x="0" y="8" width="38" height="160" rx="2" fill="#2D3136"/>
      <rect x="0" y="8" width="5" height="160" rx="1" fill="#23272B"/>
      <rect x="11" y="78" width="18" height="7" rx="1.5" fill="#FFFFFF" opacity="0.85"/>
    </g>

    <g transform="translate(40, 0)">
      <rect x="0" y="0" width="12" height="168" rx="1" fill="#7B8FA1"/>
      <rect x="8" y="0" width="38" height="168" rx="2" fill="#2D3136"/>
      <rect x="8" y="0" width="5" height="168" rx="1" fill="#23272B"/>
      <rect x="20" y="78" width="18" height="7" rx="1.5" fill="#FFFFFF" opacity="0.85"/>
    </g>

    <g transform="translate(84, 12)">
      <rect x="0" y="0" width="38" height="156" rx="2" fill="#2D3136"/>
      <rect x="0" y="0" width="5" height="156" rx="1" fill="#23272B"/>
      <rect x="11" y="72" width="18" height="7" rx="1.5" fill="#FFFFFF" opacity="0.85"/>
    </g>
  </g>

  <text
    x="420"
    y="286"
    font-family="Baskerville, 'Libre Baskerville', 'Times New Roman', serif"
    font-size="118"
    font-weight="400"
    fill="#2D3136"
    letter-spacing="-0.7"
  >Bibliography</text>

  <text
    x="422"
    y="378"
    font-family="Baskerville, 'Libre Baskerville', 'Times New Roman', serif"
    font-size="44"
    font-weight="400"
    fill="#7B8FA1"
    letter-spacing="0.2"
  >Scholarly references for WordPress</text>
</svg>
