<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Author Identity systems diagram</title>
  <desc id="desc">A warm-toned architecture-style diagram for Author Identity, showing WordPress adapters feeding a normalized author contract that powers feed metadata, JSON-LD, fediverse identity, and AI-rights signaling.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1080" y2="590" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EA"/>
      <stop offset="0.6" stop-color="#F4E7D2"/>
      <stop offset="1" stop-color="#EED9BE"/>
    </linearGradient>
    <linearGradient id="warmAccent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D96B3B"/>
      <stop offset="1" stop-color="#C3472C"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D8A94B"/>
      <stop offset="1" stop-color="#C98B2E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#7F4C27" flood-opacity="0.14"/>
    </filter>
    <style>
      .eyebrow{font:700 11px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:.18em;text-transform:uppercase;fill:#9D613C}
      .title{font:700 21px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#2F2A26}
      .subtitle{font:500 15px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#5D5148}
      .chip{font:700 13px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#402E23}
      .small{font:700 12px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#5D4330}
      .body{font:500 14px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#5E5145}
    </style>
  </defs>

  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <circle cx="1030" cy="88" r="154" fill="#E79A58" opacity="0.12"/>
  <circle cx="150" cy="560" r="170" fill="#D05538" opacity="0.08"/>
  <circle cx="1090" cy="545" r="118" fill="#D8A94B" opacity="0.08"/>

  <text x="72" y="76" class="eyebrow">Author Identity</text>
  <text x="72" y="116" class="title">Portable authorship system for WordPress</text>
  <text x="72" y="144" class="subtitle">Normalize author data once, then emit structured identity across feeds, schema, federation, and rights metadata.</text>

  <g filter="url(#shadow)">
    <rect x="330" y="118" width="536" height="382" rx="26" fill="#FFF9F2" stroke="#D9B899"/>
    <rect x="356" y="144" width="484" height="92" rx="18" fill="#FFF0E2" stroke="#E2BA97"/>
    <text x="382" y="171" class="eyebrow">Core model</text>
    <text x="382" y="205" class="title">Normalized author contract</text>
    <text x="382" y="227" class="subtitle">WordPress as a source of truth for richer author identity.</text>

    <g>
      <rect x="372" y="262" width="208" height="104" rx="18" fill="#FFF7ED" stroke="#E5C5A6"/>
      <text x="394" y="287" class="eyebrow">Identity fields</text>
      <text x="394" y="316" class="chip">display_name · role</text>
      <text x="394" y="339" class="chip">profiles · sameAs</text>
      <text x="394" y="362" class="chip">actor URL · handles</text>
    </g>

    <g>
      <rect x="608" y="262" width="216" height="104" rx="18" fill="#FFF7ED" stroke="#E5C5A6"/>
      <text x="630" y="287" class="eyebrow">Editorial / rights</text>
      <text x="630" y="316" class="chip">byline:perspective</text>
      <text x="630" y="339" class="chip">consent · overrides</text>
      <text x="630" y="362" class="chip">audit log · denials</text>
    </g>

    <g>
      <rect x="372" y="390" width="452" height="88" rx="18" fill="#FFF3E5" stroke="#E2BA97"/>
      <text x="394" y="415" class="eyebrow">Output rule</text>
      <text x="394" y="446" class="title">Outputs react to one normalized data model</text>
      <text x="394" y="468" class="body">Feeds, schema, federation, and rights signals render different views of the same author contract.</text>
    </g>

    <g transform="translate(394 486)">
      <rect width="94" height="22" rx="11" fill="#F6DDC6"/>
      <text x="13" y="15" class="small">feeds</text>
    </g>
    <g transform="translate(498 486)">
      <rect width="98" height="22" rx="11" fill="#F8E7B8"/>
      <text x="14" y="15" class="small">schema</text>
    </g>
    <g transform="translate(606 486)">
      <rect width="110" height="22" rx="11" fill="#F4D5BE"/>
      <text x="14" y="15" class="small">fediverse</text>
    </g>
    <g transform="translate(726 486)">
      <rect width="98" height="22" rx="11" fill="#F1DDC7"/>
      <text x="15" y="15" class="small">AI / rights</text>
    </g>
  </g>

  <g>
    <rect x="62" y="172" width="206" height="64" rx="18" fill="#FFF7ED" stroke="#DFC1A5"/>
    <text x="86" y="196" class="eyebrow">Adapter</text>
    <text x="86" y="221" class="chip">Core WordPress</text>

    <rect x="62" y="254" width="206" height="64" rx="18" fill="#FFF7ED" stroke="#DFC1A5"/>
    <text x="86" y="278" class="eyebrow">Adapter</text>
    <text x="86" y="303" class="chip">Co-Authors Plus</text>

    <rect x="62" y="336" width="206" height="64" rx="18" fill="#FFF7ED" stroke="#DFC1A5"/>
    <text x="86" y="360" class="eyebrow">Adapter</text>
    <text x="86" y="385" class="chip">PublishPress Authors</text>

    <rect x="62" y="418" width="206" height="64" rx="18" fill="#FFF7ED" stroke="#DFC1A5"/>
    <text x="86" y="442" class="eyebrow">Adapter</text>
    <text x="86" y="467" class="chip">HM Authorship</text>
  </g>

  <g>
    <rect x="918" y="168" width="222" height="66" rx="18" fill="#FFF7ED" stroke="#DFC1A5"/>
    <text x="942" y="193" class="eyebrow">Feed outputs</text>
    <text x="942" y="218" class="chip">RSS · Atom · JSON Feed</text>

    <rect x="918" y="252" width="222" height="66" rx="18" fill="#FFF7ED" stroke="#DFC1A5"/>
    <text x="942" y="277" class="eyebrow">Schema outputs</text>
    <text x="942" y="302" class="chip">JSON-LD Article + Person</text>

    <rect x="918" y="336" width="222" height="66" rx="18" fill="#FFF7ED" stroke="#DFC1A5"/>
    <text x="942" y="361" class="eyebrow">Federation outputs</text>
    <text x="942" y="386" class="chip">creator + actor identity</text>

    <rect x="918" y="420" width="222" height="66" rx="18" fill="#FFF7ED" stroke="#DFC1A5"/>
    <text x="942" y="445" class="eyebrow">Rights outputs</text>
    <text x="942" y="470" class="chip">robots · TDMRep · ai.txt</text>
  </g>

  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M268 204C300 204 305 190 330 190" stroke="url(#warmAccent)" stroke-width="3.5"/>
    <path d="M268 286C300 286 307 246 330 246" stroke="url(#warmAccent)" stroke-width="3.5"/>
    <path d="M268 368C300 368 307 320 330 320" stroke="url(#warmAccent)" stroke-width="3.5"/>
    <path d="M268 450C300 450 307 394 330 394" stroke="url(#warmAccent)" stroke-width="3.5"/>

    <path d="M866 201C892 201 900 201 918 201" stroke="url(#goldAccent)" stroke-width="3.5"/>
    <path d="M866 285C892 285 900 285 918 285" stroke="url(#goldAccent)" stroke-width="3.5"/>
    <path d="M866 369C892 369 900 369 918 369" stroke="url(#goldAccent)" stroke-width="3.5"/>
    <path d="M866 453C892 453 900 453 918 453" stroke="url(#goldAccent)" stroke-width="3.5"/>

    <path d="M476 366V390" stroke="#D4B08A" stroke-width="2.5" stroke-dasharray="7 8"/>
    <path d="M720 366V390" stroke="#D4B08A" stroke-width="2.5" stroke-dasharray="7 8"/>
  </g>

  <g>
    <rect x="72" y="544" width="1056" height="48" rx="16" fill="#FFF8F0" stroke="#DFC1A5"/>
    <text x="96" y="564" class="eyebrow">Design principle</text>
    <text x="96" y="584" class="body">Separate authorship from presentation: adapters normalize source systems, outputs stay additive, and identity metadata travels with the work instead of collapsing at syndication.</text>
  </g>
</svg>
